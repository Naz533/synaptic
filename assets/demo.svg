<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <!-- Node glow filters -->
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4F8EF7" opacity="0.7"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9900" opacity="0.9"/>
    </marker>
    <marker id="arrow-pink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E84393" opacity="0.9"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF4444"/>
    </marker>

    <!-- Pulse animation for nodes -->
    <style>
      .node-pulse { animation: pulse 3s ease-in-out infinite; }
      .node-pulse-2 { animation: pulse 3s ease-in-out infinite 0.5s; }
      .node-pulse-3 { animation: pulse 3s ease-in-out infinite 1s; }
      .node-pulse-4 { animation: pulse 3s ease-in-out infinite 1.5s; }
      @keyframes pulse {
        0%, 100% { opacity: 0.15; r: 20; }
        50% { opacity: 0.35; r: 26; }
      }

      .edge-draw { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s ease forwards; }
      .edge-draw-2 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s ease forwards 0.15s; }
      .edge-draw-3 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s ease forwards 0.3s; }
      .edge-draw-4 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s ease forwards 0.45s; }
      .edge-draw-5 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s ease forwards 0.6s; }
      .edge-draw-6 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s ease forwards 0.75s; }
      .edge-draw-7 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s ease forwards 0.9s; }
      .edge-draw-8 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s ease forwards 1.05s; }
      .edge-draw-9 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 1.2s ease forwards 1.2s; }
      @keyframes draw { to { stroke-dashoffset: 0; } }

      .fade-in { opacity: 0; animation: fadein 0.5s ease forwards; }
      .fade-in-1 { opacity: 0; animation: fadein 0.5s ease forwards 0.2s; }
      .fade-in-2 { opacity: 0; animation: fadein 0.5s ease forwards 0.5s; }
      .fade-in-3 { opacity: 0; animation: fadein 0.5s ease forwards 0.8s; }
      .fade-in-4 { opacity: 0; animation: fadein 0.5s ease forwards 1.1s; }
      .fade-in-5 { opacity: 0; animation: fadein 0.5s ease forwards 1.4s; }
      .fade-in-6 { opacity: 0; animation: fadein 0.5s ease forwards 1.7s; }
      .fade-in-7 { opacity: 0; animation: fadein 0.5s ease forwards 2.0s; }
      .fade-in-8 { opacity: 0; animation: fadein 0.5s ease forwards 2.3s; }
      @keyframes fadein { to { opacity: 1; } }

      .float { animation: float 4s ease-in-out infinite; }
      .float-2 { animation: float 4s ease-in-out infinite 1s; }
      .float-3 { animation: float 4s ease-in-out infinite 2s; }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }

      .scan-line { animation: scan 4s linear infinite; }
      @keyframes scan {
        0% { transform: translateY(-10px); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateY(510px); opacity: 0; }
      }

      .circular-edge { animation: blink 1.5s ease-in-out infinite; }
      @keyframes blink {
        0%, 100% { stroke-opacity: 0.5; }
        50% { stroke-opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4F8EF7" stroke-width="0.5">
    <line x1="0" y1="52" x2="900" y2="52"/>
    <line x1="0" y1="104" x2="900" y2="104"/>
    <line x1="0" y1="156" x2="900" y2="156"/>
    <line x1="0" y1="208" x2="900" y2="208"/>
    <line x1="0" y1="260" x2="900" y2="260"/>
    <line x1="0" y1="312" x2="900" y2="312"/>
    <line x1="0" y1="364" x2="900" y2="364"/>
    <line x1="0" y1="416" x2="900" y2="416"/>
    <line x1="0" y1="468" x2="900" y2="468"/>
    <line x1="90" y1="0" x2="90" y2="520"/>
    <line x1="180" y1="0" x2="180" y2="520"/>
    <line x1="270" y1="0" x2="270" y2="520"/>
    <line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/>
    <line x1="540" y1="0" x2="540" y2="520"/>
    <line x1="630" y1="0" x2="630" y2="520"/>
    <line x1="720" y1="0" x2="720" y2="520"/>
    <line x1="810" y1="0" x2="810" y2="520"/>
  </g>

  <!-- Scan line effect -->
  <rect class="scan-line" x="0" y="0" width="900" height="2" fill="#4F8EF7" opacity="0.6" rx="1"/>

  <!-- ─── TITLE BAR ─── -->
  <rect x="0" y="0" width="900" height="44" fill="#111122" rx="12"/>
  <rect x="0" y="32" width="900" height="12" fill="#111122"/>
  <circle cx="20" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="22" r="6" fill="#FEBC2E"/>
  <circle cx="60" cy="22" r="6" fill="#28C840"/>
  <text x="450" y="27" text-anchor="middle" fill="#666688" font-size="11" letter-spacing="2">synaptic — dependency graph visualizer</text>

  <!-- ─── TERMINAL PANEL (left) ─── -->
  <rect x="18" y="58" width="300" height="148" fill="#0a0a16" rx="8" stroke="#1e1e3a" stroke-width="1"/>
  <rect x="18" y="58" width="300" height="24" fill="#13132a" rx="8"/>
  <rect x="18" y="70" width="300" height="12" fill="#13132a"/>
  <text x="30" y="75" fill="#4F8EF7" font-size="10" opacity="0.8">● terminal</text>

  <text x="30" y="101" fill="#4F8EF7" font-size="10" class="fade-in">$</text>
  <text x="40" y="101" fill="#e0e0ff" font-size="10" class="fade-in"> synaptic scan ./my-project</text>

  <text x="30" y="118" fill="#666688" font-size="9" class="fade-in-1">  Scanning .py files...</text>
  <text x="30" y="131" fill="#2ecc71" font-size="9" class="fade-in-2">  ✓ Found 70 Python files</text>
  <text x="30" y="144" fill="#2ecc71" font-size="9" class="fade-in-3">  ✓ Parsed 255 import edges</text>
  <text x="30" y="157" fill="#FF9900" font-size="9" class="fade-in-4">  ✓ Found 3 cloud dependencies</text>
  <text x="30" y="170" fill="#E84393" font-size="9" class="fade-in-5">  ✓ Found 5 HTTP dependencies</text>
  <text x="30" y="183" fill="#2ecc71" font-size="9" class="fade-in-6">  ✓ Graph: 97 nodes, 108 edges</text>
  <text x="30" y="196" fill="#4F8EF7" font-size="9" class="fade-in-7">  ✓ Saved → deps.html</text>

  <!-- ─── LEGEND PANEL (left bottom) ─── -->
  <rect x="18" y="218" width="300" height="136" fill="#0a0a16" rx="8" stroke="#1e1e3a" stroke-width="1"/>
  <rect x="18" y="218" width="300" height="24" fill="#13132a" rx="8"/>
  <rect x="18" y="230" width="300" height="12" fill="#13132a"/>
  <text x="30" y="235" fill="#666688" font-size="10">● legend</text>

  <circle cx="34" cy="256" r="6" fill="#4F8EF7" filter="url(#glow-blue)"/>
  <text x="46" y="260" fill="#a0a0cc" font-size="10">Internal module</text>

  <circle cx="34" cy="276" r="6" fill="#FF9900" filter="url(#glow-orange)"/>
  <text x="46" y="280" fill="#a0a0cc" font-size="10">AWS / GCP / Azure SDK</text>

  <circle cx="34" cy="296" r="6" fill="#E84393" filter="url(#glow-pink)"/>
  <text x="46" y="300" fill="#a0a0cc" font-size="10">HTTP client (requests, httpx…)</text>

  <circle cx="34" cy="316" r="6" fill="#A0A0A0"/>
  <text x="46" y="320" fill="#a0a0cc" font-size="10">External / stdlib</text>

  <line x1="28" y1="336" x2="60" y2="336" stroke="#FF4444" stroke-width="2" stroke-dasharray="4,2" class="circular-edge"/>
  <text x="70" y="340" fill="#FF6666" font-size="10">Circular dependency</text>

  <!-- ─── COMMAND EXAMPLES (bottom-left) ─── -->
  <rect x="18" y="366" width="300" height="136" fill="#0a0a16" rx="8" stroke="#1e1e3a" stroke-width="1"/>
  <rect x="18" y="366" width="300" height="24" fill="#13132a" rx="8"/>
  <rect x="18" y="378" width="300" height="12" fill="#13132a"/>
  <text x="30" y="383" fill="#666688" font-size="10">● usage</text>

  <text x="30" y="404" fill="#666688" font-size="9"># interactive HTML graph</text>
  <text x="30" y="418" fill="#4F8EF7" font-size="9">synaptic scan</text>
  <text x="100" y="418" fill="#e0e0ff" font-size="9"> ./project --output deps.html</text>

  <text x="30" y="436" fill="#666688" font-size="9"># SVG, no stdlib, highlight cycles</text>
  <text x="30" y="450" fill="#4F8EF7" font-size="9">synaptic scan</text>
  <text x="100" y="450" fill="#e0e0ff" font-size="9"> ./project \</text>
  <text x="30" y="462" fill="#e0e0ff" font-size="9">  --output deps.svg --circular</text>

  <text x="30" y="480" fill="#666688" font-size="9"># skip cloud &amp; HTTP detection</text>
  <text x="30" y="494" fill="#4F8EF7" font-size="9">synaptic scan</text>
  <text x="100" y="494" fill="#e0e0ff" font-size="9"> ./project --no-cloud --no-http</text>

  <!-- ─── GRAPH PANEL (right) ─── -->
  <rect x="334" y="58" width="548" height="444" fill="#09091a" rx="8" stroke="#1e1e3a" stroke-width="1"/>
  <rect x="334" y="58" width="548" height="24" fill="#11112a" rx="8"/>
  <rect x="334" y="70" width="548" height="12" fill="#11112a"/>
  <text x="346" y="75" fill="#666688" font-size="10">● dependency graph  —  my-project</text>

  <!-- ── PULSE RINGS (behind nodes) ── -->
  <!-- cli node -->
  <circle cx="450" cy="200" r="20" fill="#4F8EF7" opacity="0.15" class="node-pulse"/>
  <!-- api node -->
  <circle cx="580" cy="150" r="20" fill="#4F8EF7" opacity="0.15" class="node-pulse-2"/>
  <!-- AWS node -->
  <circle cx="730" cy="160" r="22" fill="#FF9900" opacity="0.15" class="node-pulse-3"/>
  <!-- HTTP node -->
  <circle cx="730" cy="340" r="22" fill="#E84393" opacity="0.15" class="node-pulse-4"/>

  <!-- ── EDGES ── -->
  <!-- main → cli -->
  <line class="edge-draw" x1="390" y1="290" x2="438" y2="215" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-blue)"/>
  <!-- main → config -->
  <line class="edge-draw-2" x1="390" y1="290" x2="430" y2="360" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-blue)"/>
  <!-- cli → api -->
  <line class="edge-draw-3" x1="476" y1="193" x2="562" y2="163" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-blue)"/>
  <!-- cli → parser -->
  <line class="edge-draw-4" x1="476" y1="207" x2="553" y2="247" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-blue)"/>
  <!-- api → AWS -->
  <line class="edge-draw-5" x1="614" y1="150" x2="700" y2="160" stroke="#FF9900" stroke-width="2" stroke-opacity="0.9" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <!-- parser → graph -->
  <line class="edge-draw-6" x1="590" y1="263" x2="636" y2="278" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-blue)"/>
  <!-- graph → HTTP -->
  <line class="edge-draw-7" x1="669" y1="298" x2="712" y2="325" stroke="#E84393" stroke-width="2" stroke-opacity="0.9" stroke-dasharray="6,3" marker-end="url(#arrow-pink)"/>
  <!-- config → parser (circular!) -->
  <path class="edge-draw-8 circular-edge" d="M 452,370 C 480,430 560,430 568,280" fill="none" stroke="#FF4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- scanner → main -->
  <line class="edge-draw-9" x1="382" y1="172" x2="382" y2="270" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow-blue)"/>

  <!-- ── NODES ── -->

  <!-- scanner -->
  <g class="float fade-in-1">
    <circle cx="382" cy="155" r="28" fill="#1a1a3a" stroke="#4F8EF7" stroke-width="1.5" filter="url(#glow-blue)"/>
    <text x="382" y="151" text-anchor="middle" fill="#4F8EF7" font-size="9" font-weight="bold">scanner</text>
    <text x="382" y="163" text-anchor="middle" fill="#666688" font-size="7">.py</text>
  </g>

  <!-- main -->
  <g class="fade-in-2">
    <circle cx="382" cy="290" r="32" fill="#1a1a3a" stroke="#4F8EF7" stroke-width="2" filter="url(#glow-blue)"/>
    <text x="382" y="286" text-anchor="middle" fill="#7ab8ff" font-size="10" font-weight="bold">main</text>
    <text x="382" y="298" text-anchor="middle" fill="#666688" font-size="7">entrypoint</text>
  </g>

  <!-- cli -->
  <g class="float-2 fade-in-3">
    <circle cx="450" cy="200" r="30" fill="#1a1a3a" stroke="#4F8EF7" stroke-width="2" filter="url(#glow-blue)"/>
    <text x="450" y="196" text-anchor="middle" fill="#4F8EF7" font-size="10" font-weight="bold">cli</text>
    <text x="450" y="208" text-anchor="middle" fill="#666688" font-size="7">typer</text>
  </g>

  <!-- config -->
  <g class="float-3 fade-in-4">
    <circle cx="450" cy="375" r="28" fill="#1a1a3a" stroke="#4F8EF7" stroke-width="1.5" filter="url(#glow-blue)"/>
    <text x="450" y="371" text-anchor="middle" fill="#4F8EF7" font-size="9" font-weight="bold">config</text>
    <text x="450" y="383" text-anchor="middle" fill="#FF4444" font-size="7">⚠ circular</text>
  </g>

  <!-- api -->
  <g class="float fade-in-5">
    <circle cx="580" cy="150" r="30" fill="#1a1a3a" stroke="#4F8EF7" stroke-width="2" filter="url(#glow-blue)"/>
    <text x="580" y="146" text-anchor="middle" fill="#4F8EF7" font-size="10" font-weight="bold">api</text>
    <text x="580" y="158" text-anchor="middle" fill="#666688" font-size="7">routes</text>
  </g>

  <!-- parser -->
  <g class="float-2 fade-in-6">
    <circle cx="568" cy="260" r="30" fill="#1a1a3a" stroke="#4F8EF7" stroke-width="2" filter="url(#glow-blue)"/>
    <text x="568" y="256" text-anchor="middle" fill="#4F8EF7" font-size="10" font-weight="bold">parser</text>
    <text x="568" y="268" text-anchor="middle" fill="#666688" font-size="7">ast</text>
  </g>

  <!-- graph -->
  <g class="float-3 fade-in-7">
    <circle cx="650" cy="285" r="30" fill="#1a1a3a" stroke="#4F8EF7" stroke-width="2" filter="url(#glow-blue)"/>
    <text x="650" y="281" text-anchor="middle" fill="#4F8EF7" font-size="10" font-weight="bold">graph</text>
    <text x="650" y="293" text-anchor="middle" fill="#666688" font-size="7">pyvis</text>
  </g>

  <!-- AWS node -->
  <g class="float fade-in-8">
    <circle cx="730" cy="160" r="34" fill="#1a0d00" stroke="#FF9900" stroke-width="2" filter="url(#glow-orange)"/>
    <text x="730" y="154" text-anchor="middle" fill="#FF9900" font-size="9" font-weight="bold">AWS</text>
    <text x="730" y="166" text-anchor="middle" fill="#cc7700" font-size="8">boto3</text>
    <text x="730" y="177" text-anchor="middle" fill="#885500" font-size="7">s3 · lambda</text>
  </g>

  <!-- HTTP node -->
  <g class="float-2 fade-in-8">
    <circle cx="730" cy="340" r="34" fill="#1a0010" stroke="#E84393" stroke-width="2" filter="url(#glow-pink)"/>
    <text x="730" y="334" text-anchor="middle" fill="#E84393" font-size="9" font-weight="bold">HTTP</text>
    <text x="730" y="346" text-anchor="middle" fill="#aa2266" font-size="8">requests</text>
    <text x="730" y="357" text-anchor="middle" fill="#771144" font-size="7">httpx · aiohttp</text>
  </g>

  <!-- GCP node (smaller, secondary) -->
  <g class="fade-in-8">
    <circle cx="810" cy="245" r="26" fill="#00081a" stroke="#4285F4" stroke-width="1.5" filter="url(#glow-blue)"/>
    <text x="810" y="240" text-anchor="middle" fill="#4285F4" font-size="9" font-weight="bold">GCP</text>
    <text x="810" y="252" text-anchor="middle" fill="#1a4a99" font-size="7">firebase</text>
  </g>
  <line class="edge-draw-9" x1="762" y1="178" x2="792" y2="228" stroke="#4285F4" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>

  <!-- ── STATS BAR ── -->
  <rect x="334" y="466" width="548" height="36" fill="#11112a" rx="0"/>
  <rect x="334" y="466" width="548" height="36" fill="#11112a" rx="8"/>
  <rect x="334" y="458" width="548" height="16" fill="#11112a"/>

  <text x="360" y="489" fill="#4F8EF7" font-size="10" font-weight="bold">70</text>
  <text x="374" y="489" fill="#444466" font-size="10"> files</text>
  <text x="424" y="489" fill="#4F8EF7" font-size="10" font-weight="bold">255</text>
  <text x="443" y="489" fill="#444466" font-size="10"> edges</text>
  <text x="494" y="489" fill="#FF9900" font-size="10" font-weight="bold">3</text>
  <text x="503" y="489" fill="#444466" font-size="10"> cloud</text>
  <text x="544" y="489" fill="#E84393" font-size="10" font-weight="bold">5</text>
  <text x="553" y="489" fill="#444466" font-size="10"> http</text>
  <text x="594" y="489" fill="#FF4444" font-size="10" font-weight="bold">2</text>
  <text x="603" y="489" fill="#444466" font-size="10"> circular</text>
  <text x="660" y="489" fill="#2ecc71" font-size="10" font-weight="bold">97</text>
  <text x="671" y="489" fill="#444466" font-size="10"> nodes</text>
  <text x="714" y="489" fill="#2ecc71" font-size="10" font-weight="bold">108</text>
  <text x="731" y="489" fill="#444466" font-size="10"> arcs</text>
  <text x="780" y="489" fill="#666688" font-size="9">● live</text>
  <circle cx="800" cy="485" r="4" fill="#2ecc71">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
